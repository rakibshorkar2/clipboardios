name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build Runner
      run: dart run build_runner build --delete-conflicting-outputs
      
    - name: Force Disable Code Signing
      run: |
        sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' ios/Runner.xcodeproj/project.pbxproj
        sed -i '' 's/CODE_SIGNING_REQUIRED = YES/CODE_SIGNING_REQUIRED = NO/g' ios/Runner.xcodeproj/project.pbxproj
        sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = //g' ios/Runner.xcodeproj/project.pbxproj
        echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
        echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig
        echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Generated.xcconfig
        echo "PROVISIONING_PROFILE_SPECIFIER=" >> ios/Flutter/Generated.xcconfig

    - name: Build iOS
      run: |
        # Use xcodebuild directly through flutter to pass extra flags
        flutter build ios --release --no-codesign --extra-gen-snapshot-options=--no-codesign --build-number=1 --build-name=1.0.0
      
    - name: Create IPA
      run: |
        mkdir -p Payload
        cp -r build/ios/iphoneos/Runner.app Payload/
        zip -r ClipVault.ipa Payload
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: clipvault-ipa
        path: ClipVault.ipa
