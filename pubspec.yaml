name: clipvault
description: "ClipVault - The ultimate clipboard manager for iOS."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Database
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.21
  path: ^1.9.0
  
  # Models & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  
  # Navigation
  go_router: ^13.2.0
  
  # Storage & Auth
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^7.2.0
  googleapis: ^13.1.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  
  # Integrations
  receive_sharing_intent: ^1.6.3
  google_mlkit_text_recognition: ^0.13.0
  local_auth: ^2.2.0
  quick_actions: ^1.0.9
  home_widget: ^0.4.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  share_plus: ^9.0.0
  url_launcher: ^6.2.6
  
  # Utilities
  uuid: ^4.4.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  intl: ^0.19.0
  http: ^1.2.1
  html: ^0.15.4
  image: ^4.2.0
  cached_network_image: ^3.3.1
  pasteboard: ^0.2.0
  file_picker: ^8.0.0+1
  flutter_core_spotlight: ^0.0.1
  flutter_local_notifications: ^17.1.0
  live_activities: ^2.0.2
  app_links: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  drift_dev: ^2.16.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  
  # Enable assets for icons and images if needed later
  # assets:
  #   - assets/images/
